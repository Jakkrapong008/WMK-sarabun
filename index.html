<!doctype html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><?= appName ?></title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <? if (frontendBaseUrl) { ?>
    <link rel="stylesheet" href="<?= frontendBaseUrl ?>/assets/app.css?v=<?= frontendVersion ?>">
  <? } ?>
</head>
<body>
  <div id="app-root" class="min-h-screen bg-slate-100">
    <div class="min-h-screen flex items-center justify-center p-6">
      <div class="bg-white shadow-xl rounded-2xl p-8 text-center max-w-lg w-full">
        <h1 class="text-2xl font-bold text-blue-700"><?= appName ?></h1>
        <? if (frontendBaseUrl) { ?>
          <p class="mt-3 text-slate-500">กำลังโหลดหน้าเว็บ...</p>
        <? } else { ?>
          <p class="mt-3 text-red-600 font-semibold">ยังไม่ได้ตั้งค่า GitHub Pages URL</p>
          <p class="mt-2 text-slate-600 text-sm">กลับไปที่ Google Sheet → เมนู “ระบบสารบรรณ” → “ตั้ง URL ของ GitHub Pages”</p>
        <? } ?>
      </div>
    </div>
  </div>

  <script>
    window.APP_BOOTSTRAP = {
      name: <?!= JSON.stringify(appName) ?>,
      version: <?!= JSON.stringify(appVersion) ?>,
      frontendVersion: <?!= JSON.stringify(frontendVersion) ?>
    };
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <? if (frontendBaseUrl) { ?>
    <script src="<?= frontendBaseUrl ?>/assets/app.js?v=<?= frontendVersion ?>"></script>
  <? } ?>
</body>
</html>
